spring:
  datasource:
    url: jdbc:h2:mem:sprint_risk;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  # In dev/test we let Hibernate manage the schema. Flyway runs against PostgreSQL in prod.
  flyway:
    enabled: false
